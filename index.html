<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NYC Music Map</title>

  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:             #f2f1ee;
      --dot:            #1a1a1a;
      --card-bg:        #ffffff;
      --card-border:    #e0ddd8;
      --text-primary:   #1a1a1a;
      --text-secondary: #6b6560;
      --text-label:     #999490;
      --accent:         #c0392b;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html, body { height: 100%; font-family: var(--font); background: var(--bg); overflow: hidden; }
    #map { position: fixed; inset: 0; }

    #wordmark {
      position: fixed; top: 20px; left: 20px; z-index: 10;
      pointer-events: none; user-select: none;
    }
    #wordmark h1 {
      font-size: 13px; font-weight: 600; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--text-primary); line-height: 1;
    }
    #wordmark p {
      font-size: 10px; letter-spacing: 0.08em; color: var(--text-label);
      text-transform: uppercase; margin-top: 3px;
    }

    #venue-count {
      position: fixed; top: 20px; right: 20px; z-index: 10;
      font-size: 11px; letter-spacing: 0.08em; color: var(--text-label);
      text-transform: uppercase; pointer-events: none;
    }

    #filter-bar {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      z-index: 10; display: flex; gap: 6px;
      background: rgba(255,255,255,0.94); backdrop-filter: blur(8px);
      border: 1px solid var(--card-border); border-radius: 999px; padding: 6px 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .pill {
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 5px 12px; border-radius: 999px;
      border: none; background: transparent; color: var(--text-secondary);
      cursor: pointer; transition: background 0.15s, color 0.15s; white-space: nowrap;
    }
    .pill:hover  { background: #eeebe6; }
    .pill.active { background: var(--dot); color: #fff; }

    #popup {
      display: none; position: fixed; z-index: 20; width: 290px;
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.13); overflow: hidden;
    }
    #popup-head {
      padding: 13px 14px 11px; border-bottom: 1px solid var(--card-border);
      display: flex; align-items: flex-start; gap: 8px;
    }
    #popup-titles { flex: 1; min-width: 0; }
    #popup-name { font-size: 14px; font-weight: 700; color: var(--text-primary); line-height: 1.3; word-wrap: break-word; }
    #popup-meta { font-size: 11px; color: var(--text-label); margin-top: 2px; }
    #popup-close {
      flex-shrink: 0; width: 22px; height: 22px; border: none;
      background: #f0ede8; border-radius: 50%; cursor: pointer;
      font-size: 13px; color: var(--text-secondary); line-height: 22px;
    }
    #popup-close:hover { background: #e4e0d8; }
    #popup-body { padding: 11px 14px 13px; max-height: 300px; overflow-y: auto; }
    .no-events { font-size: 12px; color: var(--text-label); font-style: italic; }
    .ev { padding: 9px 0; border-bottom: 1px solid var(--card-border); }
    .ev:last-child { border-bottom: none; }
    .ev-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .ev-meta { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }
    .ev-meta span { margin-right: 10px; }
    .ev-meta .free { color: #2e7d32; }
    .ev-performers { margin-top: 5px; }
    .ev-performer { font-size: 11px; color: var(--text-secondary); padding: 1px 0; }
    .ev-performer.headliner { font-weight: 600; color: var(--text-primary); }
    #popup-foot {
      padding: 9px 14px; border-top: 1px solid var(--card-border); background: #faf9f7;
    }
    #popup-link {
      font-size: 11px; color: var(--text-label); text-decoration: none;
      display: flex; align-items: center; gap: 4px;
    }
    #popup-link:hover { color: var(--text-primary); }

    #loading {
      position: fixed; inset: 0; z-index: 50; background: var(--bg);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 14px;
    }
    #loading.gone { display: none; }
    .spinner {
      width: 30px; height: 30px; border: 2px solid #d8d4cc;
      border-top-color: #1a1a1a; border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #load-msg { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-label); }

    .mapboxgl-ctrl-logo, .mapboxgl-ctrl-attrib { display: none !important; }
    .mapboxgl-ctrl-group {
      background: rgba(255,255,255,0.9) !important;
      border: 1px solid var(--card-border) !important;
      border-radius: 8px !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07) !important;
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div id="load-msg">Loading NYC Music Map</div>
</div>

<div id="map"></div>

<div id="wordmark">
  <h1>NYC Music Map</h1>
  <p>Live music · all five boroughs</p>
</div>

<div id="venue-count"></div>

<div id="filter-bar">
  <button class="pill active" data-b="All">All</button>
  <button class="pill" data-b="Manhattan">Manhattan</button>
  <button class="pill" data-b="Brooklyn">Brooklyn</button>
  <button class="pill" data-b="Queens">Queens</button>
  <button class="pill" data-b="Bronx">Bronx</button>
  <button class="pill" data-b="Staten Island">S.I.</button>
</div>

<div id="popup">
  <div id="popup-head">
    <div id="popup-titles">
      <div id="popup-name"></div>
      <div id="popup-meta"></div>
    </div>
    <button id="popup-close">&#x2715;</button>
  </div>
  <div id="popup-body"></div>
  <div id="popup-foot">
    <a id="popup-link" href="#" target="_blank" rel="noopener">
      &#x2197; <span id="popup-link-label">Visit website</span>
    </a>
  </div>
</div>

<script>
  
const MAPBOX_TOKEN = "pk.eyJ1Ijoid2F2ZWxhbmdzdG9uIiwiYSI6ImNtbXk3eTFwZjNhbnUycHEzbjZidml4aWsifQ.KKNPwR6GhTCQA0UVVhnl3A";


mapboxgl.accessToken = MAPBOX_TOKEN;

let venues = [];
let events = {};
let activeBorough = "All";
let openVenueId = null;

const loadingEl  = document.getElementById("loading");
const popupEl    = document.getElementById("popup");
const popupName  = document.getElementById("popup-name");
const popupMeta  = document.getElementById("popup-meta");
const popupBody  = document.getElementById("popup-body");
const popupLink  = document.getElementById("popup-link");
const popupLabel = document.getElementById("popup-link-label");
const countEl    = document.getElementById("venue-count");

function showError(msg) {
  loadingEl.innerHTML =
    '<div style="text-align:center;padding:40px;max-width:360px;font-family:system-ui,sans-serif;">' +
    '<div style="font-size:28px;margin-bottom:14px;">&#x26A0;&#xFE0F;</div>' +
    '<div style="font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:10px;">Could not load the map</div>' +
    '<div style="font-size:12px;color:#6b6560;line-height:1.7;">' + msg + '</div>' +
    '<div style="margin-top:18px;font-size:11px;color:#aaa;">Press F12 and check the Console tab for details.</div>' +
    '</div>';
}

const killswitch = setTimeout(function() {
  if (!loadingEl.classList.contains("gone")) {
    showError("Timed out waiting for the map. Most likely your Mapbox token is invalid or missing.");
  }
}, 15000);

const map = new mapboxgl.Map({
  container: "map",
  style: "mapbox://styles/mapbox/light-v11",
  center: [-73.9857, 40.7484],
  zoom: 13,
  minZoom: 9,
  maxZoom: 18,
  pitchWithRotate: false,
  dragRotate: false,
});

map.addControl(new mapboxgl.NavigationControl({ showCompass: false }), "bottom-right");

map.on("error", function(e) {
  console.error("Mapbox error:", e);
  var msg = (e && e.error && e.error.message) ? e.error.message : JSON.stringify(e);
  if (msg.indexOf("401") !== -1 || msg.toLowerCase().indexOf("unauthorized") !== -1) {
    showError("Mapbox says <strong>Unauthorized (401)</strong>. Your token is wrong or still the placeholder. Open index.html and replace <em>YOUR_MAPBOX_TOKEN_HERE</em> with your real token from account.mapbox.com.");
  }
});

async function loadData() {
  var vr = await fetch("./venues.json");
  var er = await fetch("./events.json");
  if (!vr.ok) throw new Error("venues.json returned HTTP " + vr.status + ". Check the file is in the repo root.");
  if (!er.ok) throw new Error("events.json returned HTTP " + er.status + ". Check the file is in the repo root.");
  venues = await vr.json();
  var ed = await er.json();
  events = ed.events || {};
}

function geolocate() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      map.flyTo({ center: [pos.coords.longitude, pos.coords.latitude], zoom: 14, duration: 1400 });
      addUserDot(pos.coords.latitude, pos.coords.longitude);
    },
    function(err) { console.warn("Geolocation:", err); },
    { timeout: 8000 }
  );
}

function addUserDot(lat, lng) {
  var geo = { type: "Feature", geometry: { type: "Point", coordinates: [lng, lat] } };
  if (map.getSource("user-loc")) { map.getSource("user-loc").setData(geo); return; }
  map.addSource("user-loc", { type: "geojson", data: geo });
  map.addLayer({ id: "user-ring", type: "circle", source: "user-loc",
    paint: { "circle-radius": 12, "circle-color": "rgba(41,98,255,0.1)",
             "circle-stroke-width": 1.5, "circle-stroke-color": "rgba(41,98,255,0.4)" } });
  map.addLayer({ id: "user-dot", type: "circle", source: "user-loc",
    paint: { "circle-radius": 5, "circle-color": "#2962ff",
             "circle-stroke-width": 2, "circle-stroke-color": "#fff" } });
}

function toGeoJSON(borough) {
  var list = borough === "All" ? venues : venues.filter(function(v) { return v.borough === borough; });
  return {
    type: "FeatureCollection",
    features: list.map(function(v) {
      return {
        type: "Feature",
        geometry: { type: "Point", coordinates: [v.lng, v.lat] },
        properties: {
          id:           String(v.id),
          name:         v.name || "",
          address:      v.address || "",
          borough:      v.borough || "",
          neighborhood: v.neighborhood || "",
          website:      v.website || "",
          calendar_url: v.calendar_url || "",
          has_events:   !!(events[String(v.id)] && events[String(v.id)].length),
        },
      };
    }),
  };
}

function addDots() {
  map.addSource("venues", { type: "geojson", data: toGeoJSON("All") });
  map.addLayer({
    id: "venue-dots",
    type: "circle",
    source: "venues",
    paint: {
      "circle-radius":       ["interpolate", ["linear"], ["zoom"], 9,2, 12,4, 14,6, 18,9],
      "circle-color":        ["case", ["==", ["get","has_events"], true], "#c0392b", "#1a1a1a"],
      "circle-stroke-width": ["interpolate", ["linear"], ["zoom"], 9,0.5, 14,1.5, 18,2],
      "circle-stroke-color": "#ffffff",
      "circle-opacity":      0.85,
    },
  });
}

function muteStyle() {
  // Every single call is individually wrapped — one bad layer ID cannot crash anything
  function s(fn) { try { fn(); } catch(e) { /* silent */ } }

  var hide = [
    "poi-label","transit-label","road-label","waterway-label",
    "natural-label","airport-label","settlement-subdivision-label","national-park","pitch-outline",
  ];
  hide.forEach(function(id) {
    s(function() { if (map.getLayer(id)) map.setLayoutProperty(id, "visibility", "none"); });
  });

  var roads = [
    ["road-motorway-trunk","#cac6be"],["road-primary","#d4d0c8"],
    ["road-secondary-tertiary","#dedad4"],["road-street","#e4e0da"],
    ["road-street-low","#e8e5e0"],["road-minor","#eae7e2"],
    ["road-minor-low","#edeae6"],["road-pedestrian","#ece9e4"],
  ];
  roads.forEach(function(pair) {
    s(function() { if (map.getLayer(pair[0])) map.setPaintProperty(pair[0], "line-color", pair[1]); });
  });

  // water = fill layer; waterway = line layer — MUST use correct property for each
  s(function() { if (map.getLayer("water"))    map.setPaintProperty("water",    "fill-color", "#d6dbe3"); });
  s(function() { if (map.getLayer("waterway")) map.setPaintProperty("waterway", "line-color", "#d6dbe3"); });

  s(function() {
    if (map.getLayer("building")) {
      map.setPaintProperty("building", "fill-color",         "#eae7e0");
      map.setPaintProperty("building", "fill-outline-color", "#ddd9d2");
    }
  });

  s(function() { if (map.getLayer("background")) map.setPaintProperty("background", "background-color", "#f2f1ee"); });
  s(function() { if (map.getLayer("land"))       map.setPaintProperty("land",       "background-color", "#f2f1ee"); });

  ["settlement-label","place-label","state-label"].forEach(function(id) {
    s(function() {
      if (map.getLayer(id)) {
        map.setPaintProperty(id, "text-color",      "#b0aca3");
        map.setPaintProperty(id, "text-halo-color", "#f2f1ee");
      }
    });
  });
}

function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function openPopup(feature, px, py) {
  var p  = feature.properties;
  var ev = events[p.id] || [];

  popupName.textContent = p.name;
  popupMeta.textContent = p.address || [p.neighborhood, p.borough].filter(Boolean).join(" · ");

  var site = p.website || p.calendar_url;
  if (site) {
    popupLink.href = site;
    try { popupLabel.textContent = new URL(site).hostname.replace("www.",""); }
    catch(_) { popupLabel.textContent = "Visit website"; }
  }

  if (!ev.length) {
    popupBody.innerHTML = '<p class="no-events">No events listed for today.</p>';
  } else {
    popupBody.innerHTML = ev.map(function(e) {
      var priceClass = (e.ticket_price || "").toLowerCase() === "free" ? "free" : "";
      var perfs = (e.performers || []).filter(Boolean);
      return '<div class="ev">' +
        '<div class="ev-name">' + esc(e.name || "") + '</div>' +
        '<div class="ev-meta">' +
        (e.start_time   ? '<span>&#x1F550; ' + esc(e.start_time) + '</span>' : '') +
        (e.ticket_price ? '<span class="' + priceClass + '">&#x1F3AB; ' + esc(e.ticket_price) + '</span>' : '') +
        '</div>' +
        (perfs.length ? '<div class="ev-performers">' + perfs.map(function(p, pi) {
          return '<div class="ev-performer' + (pi === 0 ? ' headliner' : '') + '">' +
            (pi === 0 ? '&#x25B8; ' : '&#xA0;&#xA0;') + esc(p) + '</div>';
        }).join("") + '</div>' : '') +
        '</div>';
    }).join("");
  }

  var W = window.innerWidth, H = window.innerHeight;
  var pw = 290, ph = popupEl.offsetHeight || 250, pad = 14;
  var left = px + 16, top = py - ph / 2;
  if (left + pw > W - pad) left = px - pw - 16;
  if (top < pad) top = pad;
  if (top + ph > H - pad) top = H - ph - pad;
  popupEl.style.left = left + "px";
  popupEl.style.top  = top  + "px";
  popupEl.style.display = "block";
  openVenueId = p.id;
}
  
function closePopup() { popupEl.style.display = "none"; openVenueId = null; }

document.getElementById("popup-close").addEventListener("click", closePopup);
document.addEventListener("click", function(e) {
  if (openVenueId && !popupEl.contains(e.target)) {
    var canvas = document.querySelector(".mapboxgl-canvas-container");
    if (!canvas || !canvas.contains(e.target)) closePopup();
  }
});

function updateCount() {
  var list = activeBorough === "All" ? venues : venues.filter(function(v) { return v.borough === activeBorough; });
  var withEv = list.filter(function(v) { return events[String(v.id)] && events[String(v.id)].length; }).length;
  countEl.textContent = withEv > 0
    ? list.length + " venues \u00B7 " + withEv + " with events today"
    : list.length + " venues";
}

document.querySelectorAll(".pill").forEach(function(btn) {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".pill").forEach(function(b) { b.classList.remove("active"); });
    btn.classList.add("active");
    activeBorough = btn.dataset.b;
    if (map.getSource("venues")) map.getSource("venues").setData(toGeoJSON(activeBorough));
    updateCount();
    closePopup();
  });
});

function setupInteractions() {
  map.on("mouseenter", "venue-dots", function() { map.getCanvas().style.cursor = "pointer"; });
  map.on("mouseleave", "venue-dots", function() { map.getCanvas().style.cursor = ""; });
  map.on("click", "venue-dots", function(e) {
    if (!e.features || !e.features.length) return;
    openPopup(e.features[0], e.point.x, e.point.y);
    e.originalEvent.stopPropagation();
  });
  map.on("click", function() { closePopup(); });
}

map.on("load", async function() {
  try {
    await loadData();
  } catch(err) {
    console.error(err);
    showError(esc(err.message));
    return;
  }

  muteStyle();

  try {
    addDots();
    setupInteractions();
    geolocate();
    updateCount();
  } catch(err) {
    console.error("Setup error:", err);
    showError("Map loaded but hit a setup error: " + esc(err.message));
    return;
  }

  clearTimeout(killswitch);
  loadingEl.classList.add("gone");
});
</script>
</body>
</html>
