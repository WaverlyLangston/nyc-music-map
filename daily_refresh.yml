name: Daily Event Scrape

on:
  schedule:
    - cron: "0 12 * * *"   # 12:00 UTC = 7:00 AM ET
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run scraper
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        run: python scripts/scrape_events.py

      - name: Commit updated files
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add events.json artists.db review_queue.json
          git diff --cached --quiet || git commit -m "chore: daily refresh $(date -u +'%Y-%m-%d')"

      - name: Push
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
