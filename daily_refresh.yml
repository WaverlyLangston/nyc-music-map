name: Daily Event Scrape

on:
  schedule:
    # 12:00 UTC = 7:00 AM ET (winter/EST). GitHub Actions uses UTC.
    # During EDT (summer), this runs at 8am — adjust to "0 11 * * *" in March-November if needed.
    - cron: "0 12 * * *"
  workflow_dispatch:    # Allow manual trigger from GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # Needed to commit events.json back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run event scraper
        run: python scripts/scrape_events.py

      - name: Commit updated events.json
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add events.json
          # Only commit if events.json actually changed
          git diff --cached --quiet || git commit -m "chore: refresh events for $(date -u +'%Y-%m-%d')"

      - name: Push changes
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
